<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0f172a"/>
<title>PharmaNear Nafea</title>

<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;background:#f1f5f9;-webkit-font-smoothing:antialiased;direction:rtl;min-height:100vh;}
button{cursor:pointer;border:none;background:none;font-family:inherit;}
input,textarea,select{font-family:inherit;font-size:16px;} /* 16px prevents iOS zoom */
img{max-width:100%;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px;}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(24px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes ping{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.7);opacity:0;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes notifIn{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes scan{0%{top:4px;}50%{top:calc(100% - 7px);}100%{top:4px;}}

.fade-in{animation:fadeIn .25s ease forwards;}
.ping{animation:ping 1.4s ease-in-out infinite;}
.notif-in{animation:notifIn .35s cubic-bezier(.22,1,.36,1) forwards;}

/* ── Layout ── */
#app{min-height:100vh;display:flex;overflow-x:clip;}
.sidebar{width:240px;background:linear-gradient(180deg,#0f172a,#1e293b);display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:40;box-shadow:4px 0 24px rgba(0,0,0,.3);}
.main{flex:1;min-height:100vh;padding-right:240px;}
.header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.page{padding:16px;max-width:900px;margin:0 auto;padding-bottom:90px;}

/* ── Bottom Nav (mobile only) ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(15,23,42,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.08);z-index:50;padding-bottom:max(env(safe-area-inset-bottom),6px);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 6px;font-size:10px;font-weight:700;color:#64748b;min-height:56px;position:relative;transition:color .2s;}
.bnav-btn.active{color:#14b8a6;}
.bnav-btn svg{width:22px;height:22px;stroke:currentColor;}

/* ── Mobile overrides ── */
@media(max-width:1023px){
  .sidebar{display:none;}
  .sidebar.open{display:flex;}
  .sidebar-overlay{display:block;}
  .main{padding-right:0;}
  .bottom-nav{display:flex;}
  .menu-btn{display:flex!important;}
}
@media(min-width:1024px){
  .menu-btn{display:none!important;}
}

/* ── Card ── */
.card{background:#fff;border-radius:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.05);overflow:hidden;}
.card-scroll{overflow:hidden;}

/* ── Form inputs ── */
.inp{width:100%;padding:13px 16px;border-radius:14px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#1e293b;font-size:16px;font-weight:500;outline:none;text-align:right;transition:border-color .2s,background .2s;font-family:inherit;}
.inp:focus{border-color:#14b8a6;background:#fff;}
.inp-err{border-color:#ef4444;}
.lbl{display:block;color:#475569;font-size:13px;font-weight:700;margin-bottom:8px;}
.err-msg{color:#ef4444;font-size:12px;margin-top:5px;}

/* ── Buttons ── */
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;background:linear-gradient(135deg,#14b8a6,#06b6d4);color:#fff;border-radius:14px;font-weight:800;font-size:15px;min-height:50px;box-shadow:0 6px 16px rgba(20,184,166,.3);transition:opacity .15s,transform .15s;font-family:inherit;cursor:pointer;}
.btn-primary:active{opacity:.85;transform:scale(.97);}
.btn-sec{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;background:transparent;color:#64748b;border-radius:14px;font-weight:700;font-size:14px;min-height:50px;border:1.5px solid #e2e8f0;transition:background .15s;font-family:inherit;cursor:pointer;}
.btn-sec:active{background:#f1f5f9;}
.btn-danger{background:linear-gradient(135deg,#ef4444,#f43f5e);box-shadow:0 4px 12px rgba(239,68,68,.3);}

/* ── Toast ── */
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:9000;padding:12px 20px;border-radius:16px;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;max-width:calc(100vw - 32px);box-shadow:0 8px 32px rgba(0,0,0,.2);pointer-events:none;opacity:0;transition:opacity .3s;}
#toast.show{animation:slideUp .35s ease forwards;opacity:1;}

/* ── Notif Banner ── */
#notif-banner{position:fixed;top:12px;right:12px;left:12px;background:linear-gradient(135deg,#0f172a,#1e293b);border:1px solid rgba(20,184,166,.3);border-radius:18px;padding:14px 16px;z-index:8000;box-shadow:0 8px 32px rgba(0,0,0,.3);color:#fff;display:none;}
#notif-banner.show{display:block;}

/* ── Status badges ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:9px;font-size:11px;font-weight:700;border:1px solid;}
.badge-red{background:#fff5f5;color:#dc2626;border-color:#fecaca;}
.badge-orange{background:#fff7ed;color:#ea580c;border-color:#fed7aa;}
.badge-amber{background:#fffbeb;color:#d97706;border-color:#fde68a;}
.badge-yellow{background:#fefce8;color:#ca8a04;border-color:#fef08a;}
.badge-green{background:#f0fdf4;color:#16a34a;border-color:#86efac;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-red{background:#ef4444;}.dot-orange{background:#f97316;}.dot-amber{background:#f59e0b;}.dot-yellow{background:#eab308;}.dot-green{background:#10b981;}

/* ── Scanner ── */
.scanner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.scanner-box{width:72%;aspect-ratio:1.6;border:3px solid #14b8a6;border-radius:18px;box-shadow:0 0 0 9999px rgba(0,0,0,.55);position:relative;}
.scanner-line{position:absolute;left:0;right:0;top:4px;height:3px;background:linear-gradient(90deg,transparent,#14b8a6,transparent);animation:scan 2s ease-in-out infinite;border-radius:99px;}
.sc-corner{position:absolute;width:22px;height:22px;border-color:#14b8a6;border-style:solid;}
.sc-tl{top:-3px;left:-3px;border-width:4px 0 0 4px;border-radius:8px 0 0 0;}
.sc-tr{top:-3px;right:-3px;border-width:4px 4px 0 0;border-radius:0 8px 0 0;}
.sc-bl{bottom:-3px;left:-3px;border-width:0 0 4px 4px;border-radius:0 0 0 8px;}
.sc-br{bottom:-3px;right:-3px;border-width:0 4px 4px 0;border-radius:0 0 8px 0;}

/* ── Table ── */
.tbl-wrap{overflow-x:scroll;-webkit-overflow-scrolling:touch;position:relative;border-radius:0 0 20px 20px;scrollbar-width:thin;scrollbar-color:#14b8a6 #f1f5f9;}
.tbl-wrap::-webkit-scrollbar{height:8px;display:block;}
.tbl-wrap::-webkit-scrollbar-track{background:#f1f5f9;border-radius:99px;}
.tbl-wrap::-webkit-scrollbar-thumb{background:#14b8a6;border-radius:99px;border:2px solid #f1f5f9;}
.tbl-wrap table{min-width:680px;width:100%;border-collapse:collapse;table-layout:fixed;}
.tbl-wrap th{text-align:right;padding:10px 12px;color:#64748b;font-size:12px;font-weight:700;background:#f8fafc;border-bottom:1px solid #f1f5f9;white-space:nowrap;overflow:hidden;}
.tbl-wrap td{padding:10px 12px;border-bottom:1px solid #f8fafc;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tbl-wrap tr:last-child td{border-bottom:none;}
.tbl-wrap tr:hover td{background:#f8fafc;}
/* sticky columns mobile */
@media(max-width:768px){
  .tbl-wrap th:first-child,.tbl-wrap td:first-child{position:sticky;right:0;z-index:4;background:#f8fafc;box-shadow:-3px 0 8px rgba(0,0,0,.08);}
  .tbl-wrap td:first-child{background:#fff;}
  .tbl-wrap tr:hover td:first-child{background:#f8fafc;}
}

/* ── Filters ── */
.filter-btn{padding:8px 14px;border-radius:12px;font-size:12px;font-weight:700;min-height:40px;cursor:pointer;transition:all .15s;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-family:inherit;}
.filter-btn.active{background:#0f172a;color:#fff;border-color:#0f172a;}

/* ── Sidebar items ── */
.nav-item{width:100%;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:14px;font-size:13px;font-weight:600;text-align:right;color:#64748b;background:transparent;border:1.5px solid transparent;transition:all .2s;min-height:46px;cursor:pointer;font-family:inherit;}
.nav-item.active{background:rgba(20,184,166,.15);color:#14b8a6;border-color:rgba(20,184,166,.25);}
.nav-item svg{width:18px;height:18px;stroke:currentColor;flex-shrink:0;}

/* ── Auth screen ── */
.auth-wrap{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;padding:16px;}
.auth-box{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:24px;padding:28px;border:1px solid rgba(255,255,255,.1);}
.auth-inp{width:100%;padding:14px 44px 14px 14px;border-radius:14px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);color:#fff;font-size:16px;outline:none;text-align:right;font-family:inherit;transition:border-color .2s;}
.auth-inp:focus{border-color:#14b8a6;}
.auth-inp::placeholder{color:#475569;}

/* ── Misc ── */
.section-title{color:#14b8a6;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #f1f5f9;padding-bottom:12px;margin-bottom:16px;}
.empty-state{padding:48px 24px;text-align:center;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.flex-row{display:flex;gap:10px;}
.flex-1{flex:1;}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}
.gap-12{gap:12px;}.gap-16{gap:16px;}
.page-title{font-size:20px;font-weight:800;color:#0f172a;}
.page-sub{color:#64748b;font-size:13px;margin-top:4px;}
.info-box{border-radius:14px;padding:14px;}
.info-teal{background:#f0fdfa;border:1px solid #99f6e4;color:#0d9488;}
.info-amber{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}
.info-blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}
.info-red{background:#fff5f5;border:1px solid #fecaca;color:#dc2626;}
</style>
</head>

const K={
  accounts:'pn_v5_accounts',
  session:'pn_v5_session',
  userProducts:u=>'pn_v5_products_'+u.toLowerCase(),
  userBackup:u=>'pn_v5_backup_'+u.toLowerCase(),
  userPhone:u=>'pn_v5_phone_'+u.toLowerCase(),
};
const ls={get:k=>{try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),del:k=>localStorage.removeItem(k)};

function getAccounts(){return ls.get(K.accounts)||[];}
function saveAccounts(a){ls.set(K.accounts,a);}
function getSession(){return ls.get(K.session);}
function saveSession(s){ls.set(K.session,s);}
function clearSession(){ls.del(K.session);}
function _currentUser(){return state?.username||'';}
function getProducts(){return ls.get(K.userProducts(_currentUser()))||[];}
function saveProducts(p){ls.set(K.userProducts(_currentUser()),p);}
function addProduct(p){saveProducts([...getProducts(),p]);}
function updateProduct(u){saveProducts(getProducts().map(p=>p.id===u.id?u:p));}
function deleteProduct(id){saveProducts(getProducts().filter(p=>p.id!==id));}
function genId(){return Date.now()+'-'+Math.random().toString(36).slice(2,8);}

function registerAccount(username,password){
  const acc=getAccounts();
  if(acc.find(a=>a.username.toLowerCase()===username.toLowerCase()))return{ok:false,err:'اسم المستخدم موجود بالفعل'};
  acc.push({username,password,createdAt:new Date().toISOString()});
  saveAccounts(acc);return{ok:true};
}
function loginAccount(username,password){
  const acc=getAccounts();
  const a=acc.find(a=>a.username.toLowerCase()===username.toLowerCase()&&a.password===password);
  if(!a)return{ok:false,err:'اسم المستخدم أو كلمة المرور غير صحيحة'};
  saveSession({username:a.username,loginAt:new Date().toISOString()});
  return{ok:true,username:a.username};
}

// ══════════════════════════════════════════════════════════
function getDays(date){const n=new Date();n.setHours(0,0,0,0);const e=new Date(date);e.setHours(0,0,0,0);return Math.round((e-n)/86400000);}
function fmtDate(date){return new Date(date).toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});}
function fmtDateS(date){return new Date(date).toLocaleDateString('ar-EG',{year:'numeric',month:'numeric',day:'numeric'});}
function fmtCur(n){return(n||n===0)?Number(n).toLocaleString('ar-EG',{minimumFractionDigits:2,maximumFractionDigits:2})+' ج.م':'—';}
function getTotal(p){const q=p.quantity||0,u=p.unitQty||0,per=p.unitsPerPack||0;return per?(q*per+u):q;}
function getStatus(days){
  if(days<0)   return{label:'منتهي',cls:'badge-red',   dot:'dot-red',   color:'#dc2626'};
  if(days<=30) return{label:'حرج',   cls:'badge-orange',dot:'dot-orange',color:'#ea580c'};
  if(days<=90) return{label:'تحذير', cls:'badge-amber', dot:'dot-amber', color:'#d97706'};
  if(days<=180)return{label:'قريب',  cls:'badge-yellow',dot:'dot-yellow',color:'#ca8a04'};
  return             {label:'جيد',   cls:'badge-green', dot:'dot-green', color:'#16a34a'};
}

function triggerDownload(data,filename){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
}
function exportBackup(auto){
  const prods=getProducts();const now=new Date();
  const stamp=now.toISOString().replace(/[:.]/g,'-').slice(0,19);
  const uname=_currentUser();
  triggerDownload({appName:'PharmaNear Nafea',version:5,exportedAt:now.toISOString(),autoBackup:!!auto,username:uname,accounts:getAccounts(),products:prods},
    `backup-pharmanear-${uname}-${auto?'auto':'manual'}-${stamp}.json`);
  ls.set(K.userBackup(uname),now.toISOString());
}
function importBackup(file,onSuccess,onError){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(parsed.accounts&&Array.isArray(parsed.accounts)){
        const ex=getAccounts(),merged=[...ex];
        parsed.accounts.forEach(a=>{if(!merged.find(m=>m.username.toLowerCase()===a.username.toLowerCase()))merged.push(a);});
        saveAccounts(merged);
      }
      const prods=parsed.products||parsed;
      if(!Array.isArray(prods))throw new Error('تنسيق غير صحيح');
      saveProducts(prods);onSuccess(prods.length,parsed.accounts?.length||0);
    }catch(err){onError(err.message);}
  };
  reader.readAsText(file);
}
function buildWAMsg(products){
  const now=new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const exp=products.filter(p=>getDays(p.expiryDate)<0);
  const crit=products.filter(p=>{const d=getDays(p.expiryDate);return d>=0&&d<=30;});
  const warn=products.filter(p=>{const d=getDays(p.expiryDate);return d>30&&d<=90;});
  let m=`🏥 *تقرير PharmaNear Nafea*\n📅 ${now}\n${'─'.repeat(28)}\n\n`;
  m+=`📊 *ملخص:* إجمالي ${products.length} | 🔴 ${exp.length} | 🟠 ${crit.length} | 🟡 ${warn.length}\n\n`;
  if(exp.length){m+=`🔴 *منتهية (${exp.length}):*\n`;exp.slice(0,12).forEach((p,i)=>{m+=`${i+1}. ${p.name} — ${fmtDateS(p.expiryDate)} | ${p.quantity||0} علبة | ${fmtCur(p.sellingPrice)}\n`;});if(exp.length>12)m+=`...و${exp.length-12} آخر\n`;m+='\n';}
  if(crit.length){m+=`🟠 *حرجة <30 يوم (${crit.length}):*\n`;crit.slice(0,12).forEach((p,i)=>{const d=getDays(p.expiryDate);m+=`${i+1}. ${p.name} — ${d} يوم | ${p.quantity||0} علبة\n`;});if(crit.length>12)m+=`...و${crit.length-12} آخر\n`;m+='\n';}
  if(warn.length){m+=`🟡 *تحذير 30-90 يوم (${warn.length}):*\n`;warn.slice(0,8).forEach((p,i)=>{const d=getDays(p.expiryDate);m+=`${i+1}. ${p.name} — ${d} يوم\n`;});if(warn.length>8)m+=`...و${warn.length-8} آخر\n`;}
  if(!exp.length&&!crit.length&&!warn.length)m+=`✅ جميع الأصناف بخير 🎉\n`;
  m+=`\n${'─'.repeat(28)}\n_PharmaNear Nafea - نافع عماد_`;
  return m;
}
function sendWA(products,phone){const m=buildWAMsg(products);window.open((phone?`https://wa.me/${phone}?text=`:`https://wa.me/?text=`)+encodeURIComponent(m),'_blank');}

let _toastTimer=null;
function showToast(msg,type){
  type=type||'ok';
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';document.body.appendChild(el);}
  el.innerHTML=(type==='ok'?'✓':'✕')+' '+msg;
  el.style.background=type==='ok'?'linear-gradient(135deg,#14b8a6,#06b6d4)':'linear-gradient(135deg,#ef4444,#f43f5e)';
  el.className='show';
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{el.className='';},4000);
}

async function askNotifPerm(){
  if(!('Notification' in window))return false;
  if(Notification.permission==='granted')return true;
  if(Notification.permission==='denied')return false;
  return(await Notification.requestPermission())==='granted';
}
function fireNativeNotif(products){
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  const urgent=products.filter(p=>getDays(p.expiryDate)<=90).sort((a,b)=>getDays(a.expiryDate)-getDays(b.expiryDate)).slice(0,3);
  if(!urgent.length)return;
  const body=urgent.map(p=>{const d=getDays(p.expiryDate);return`${p.name}: ${d<0?'منتهي':d+' يوم'}`;}).join('\n');
  try{new Notification('⚠️ PharmaNear - تنبيه اكسباير',{body,tag:'pn-alert',requireInteraction:true});}catch(e){}
}
function showInAppNotif(products){
  const urgent=products.filter(p=>getDays(p.expiryDate)<=90).sort((a,b)=>getDays(a.expiryDate)-getDays(b.expiryDate)).slice(0,4);
  if(!urgent.length)return;
  const banner=document.getElementById('notif-banner');
  if(!banner)return;
  const rows=urgent.map(p=>{const d=getDays(p.expiryDate);const em=d<0?'🔴':d<=30?'🟠':'🟡';return`<div style="font-size:12px;color:#94a3b8;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${em} ${p.name} — ${d<0?'منتهي':d+' يوم'}</div>`;}).join('');
  banner.innerHTML=`
    <div style="display:flex;align-items:flex-start;gap:12px;">
      <div style="width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#f97316,#ef4444);display:flex;align-items:center;justify-content:center;flex-shrink:0;">${ic('bell',20)}</div>
      <div style="flex:1;min-width:0;">
        <p style="color:#14b8a6;font-weight:700;font-size:13px;margin-bottom:4px;">⚠️ أصناف قاربت على الانتهاء</p>
        ${rows}
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button onclick="app.navigate('alerts');closeNotifBanner();" style="flex:1;padding:8px;background:#14b8a6;color:#fff;border-radius:10px;font-weight:700;font-size:12px;font-family:inherit;cursor:pointer;">عرض التنبيهات</button>
          <button onclick="closeNotifBanner();" style="padding:8px 12px;background:rgba(255,255,255,.08);color:#64748b;border-radius:10px;font-size:12px;font-family:inherit;cursor:pointer;">تجاهل</button>
        </div>
      </div>
      <button onclick="closeNotifBanner();" style="color:#475569;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;border:none;">${ic('x',16)}</button>
    </div>`;
  banner.className='show notif-in';
  setTimeout(()=>closeNotifBanner(),15000);
}
function closeNotifBanner(){const b=document.getElementById('notif-banner');if(b)b.className='';}

// TIMERS
// ══════════════════════════════════════════════════════════
function startTimers(){
  stopTimers();
  // hourly backup
  state._autoBackupTimer=setInterval(()=>{
    const p=getProducts();if(p.length>0){exportBackup(true);showToast('💾 تم حفظ النسخة الاحتياطية');}
  },60*60*1000);
  // hourly notifications
  state._notifTimer=setInterval(()=>{
    const p=getProducts();
    const u=p.filter(x=>getDays(x.expiryDate)<=90);
    if(u.length){showInAppNotif(p);fireNativeNotif(p);if(navigator.vibrate)navigator.vibrate([200,100,200]);}
  },60*60*1000);
  // first check after 2 min
  setTimeout(()=>{
    const p=getProducts();const u=p.filter(x=>getDays(x.expiryDate)<=90);
    if(u.length){showInAppNotif(p);fireNativeNotif(p);}
  },2*60*1000);
}
function stopTimers(){
  if(state._autoBackupTimer)clearInterval(state._autoBackupTimer);
  if(state._notifTimer)clearInterval(state._notifTimer);
}

// ─── Products Table ───────────────────────────────────────
function buildProducts(){
  let products=getProducts();
  const {field,dir}=state.productsSort;
  const q=state.productsSearch.toLowerCase();
  const f=state.productsFilter;
  // filter
  products=products.filter(p=>{
    if(q&&!p.name.toLowerCase().includes(q)&&!(p.activeIngredient||'').toLowerCase().includes(q)&&!(p.barcode||'').toLowerCase().includes(q))return false;
    const d=getDays(p.expiryDate);
    if(f==='expired')return d<0;
    if(f==='critical')return d>=0&&d<=30;
    if(f==='warning')return d>30&&d<=90;
    if(f==='good')return d>180;
    return true;
  });
  // sort
  products.sort((a,b)=>{
    let va='',vb='';
    if(field==='expiryDate'){va=a.expiryDate;vb=b.expiryDate;}
    else if(field==='name'){va=a.name;vb=b.name;}
    else if(field==='qty'){va=getTotal(a);vb=getTotal(b);}
    if(va<vb)return dir==='asc'?-1:1;if(va>vb)return dir==='asc'?1:-1;return 0;
  });
  const all=getProducts();
  const fOpts=[
    {v:'all',l:'الكل',c:all.length},
    {v:'expired',l:'منتهية',c:all.filter(p=>getDays(p.expiryDate)<0).length},
    {v:'critical',l:'< 30',c:all.filter(p=>{const d=getDays(p.expiryDate);return d>=0&&d<=30;}).length},
    {v:'warning',l:'30-90',c:all.filter(p=>{const d=getDays(p.expiryDate);return d>30&&d<=90;}).length},
    {v:'good',l:'جيد',c:all.filter(p=>getDays(p.expiryDate)>180).length},
  ];
  const filterBtns=fOpts.map(o=>`<button class="filter-btn${state.productsFilter===o.v?' active':''}" onclick="setProdsFilter('${o.v}')">${o.l} <span style="opacity:.7;font-size:11px;">${o.c}</span></button>`).join('');
  const sArrow=f=>state.productsSort.field===f?(state.productsSort.dir==='asc'?'↑':'↓'):'';
  const cards=products.map((p,idx)=>{
    const days=getDays(p.expiryDate);const st=getStatus(days);
    const uPrice=(p.sellingPrice&&p.unitsPerPack&&p.unitsPerPack>0)?(p.sellingPrice/p.unitsPerPack).toFixed(2):null;
    const qtyStr=p.unitsPerPack?`${p.quantity||0} علبة + ${p.unitQty||0} قطعة`:`${p.quantity||0} علبة`;
    const delBtn=state.deleteConfirm===p.id
      ?`<div style="display:flex;gap:8px;margin-top:10px;"><button onclick="confirmDelete('${p.id}')" style="flex:1;font-size:12px;padding:9px;background:#ef4444;color:#fff;border-radius:10px;font-weight:700;font-family:inherit;cursor:pointer;border:none;">تأكيد الحذف</button><button onclick="cancelDelete()" style="flex:1;font-size:12px;padding:9px;background:#f1f5f9;color:#64748b;border-radius:10px;font-weight:700;font-family:inherit;cursor:pointer;border:none;">إلغاء</button></div>`
      :`<div style="display:flex;gap:8px;margin-top:10px;"><button onclick="startEdit('${p.id}')" style="flex:1;padding:9px;border-radius:10px;background:#f0fdfa;border:1px solid #99f6e4;color:#0d9488;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;">${ic('pencil',13)} تعديل</button><button onclick="startDelete('${p.id}')" style="flex:1;padding:9px;border-radius:10px;background:#fff5f5;border:1px solid #fecaca;color:#dc2626;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;">${ic('trash',13)} حذف</button></div>`;
    return`<div class="card" style="padding:14px;border-right:4px solid ${st.color};"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;"><div style="flex:1;min-width:0;"><div style="font-weight:800;color:#0f172a;font-size:14px;line-height:1.4;">${p.name}</div><div style="font-size:12px;color:#64748b;margin-top:2px;">${p.activeIngredient||''}</div>${p.barcode?`<div style="font-size:11px;color:#94a3b8;font-family:monospace;margin-top:2px;">${p.barcode}</div>`:''}</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;"><span class="badge ${st.cls}">${st.label}</span><span style="font-size:11px;color:#94a3b8;">#${idx+1}</span></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><div style="background:#f8fafc;border-radius:10px;padding:8px 10px;"><div style="font-size:10px;color:#94a3b8;font-weight:700;margin-bottom:3px;">📅 تاريخ الانتهاء</div><div style="font-size:12px;font-weight:700;color:#334155;">${fmtDate(p.expiryDate)}</div><div style="font-size:12px;font-weight:800;color:${st.color};">${days<0?'منتهي':days+' يوم'}</div></div><div style="background:#f8fafc;border-radius:10px;padding:8px 10px;"><div style="font-size:10px;color:#94a3b8;font-weight:700;margin-bottom:3px;">📦 الكمية</div><div style="font-size:12px;font-weight:700;color:#334155;">${qtyStr}</div></div><div style="background:#f8fafc;border-radius:10px;padding:8px 10px;"><div style="font-size:10px;color:#94a3b8;font-weight:700;margin-bottom:3px;">💰 سعر البيع</div><div style="font-size:12px;font-weight:700;color:#334155;">${fmtCur(p.sellingPrice)}</div>${uPrice?`<div style="font-size:11px;color:#16a34a;">${uPrice} ج.م / قطعة</div>`:''}</div>${p.supplier?`<div style="background:#f8fafc;border-radius:10px;padding:8px 10px;"><div style="font-size:10px;color:#94a3b8;font-weight:700;margin-bottom:3px;">🚚 المورد</div><div style="font-size:12px;font-weight:700;color:#334155;">${p.supplier}</div></div>`:'<div></div>'}</div>${delBtn}</div>`;}).join('');
  return`
<div style="display:flex;flex-direction:column;gap:14px;">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div><div class="page-title">الأصناف</div><div class="page-sub">${getProducts().length} صنف مسجل</div></div>
    <button onclick="app.navigate('add')" class="btn-primary" style="padding:10px 16px;font-size:13px;">${ic('plus',16)} إضافة</button>
  </div>
  <div style="position:relative;"><span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#94a3b8;">${ic('search',16)}</span><input class="inp" style="padding-right:44px;" placeholder="بحث باسم أو باركود أو مادة فعالة..." value="${state.productsSearch}" oninput="setProdsSearch(this.value)"/></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">${filterBtns}</div>
  ${products.length===0?`<div class="card empty-state"><div style="color:#94a3b8;">${ic('alert',36)}</div><div style="color:#94a3b8;font-weight:600;margin-top:10px;">لا توجد نتائج</div></div>`:`
  <div style="display:flex;flex-direction:column;gap:10px;">
    <div style="font-size:12px;color:#64748b;text-align:right;padding:0 4px;">إجمالي: <strong style="color:#334155;">${products.length}</strong> صنف</div>
    ${cards}
  </div>`}
  <div style="height:70px;"></div>
</div>`;
}

// ─── Search & Check ───────────────────────────────────────
function buildSearch(){
  const products=getProducts();
  const {searchQuery:q,searchMode:mode,searchDone:done}=state;

// ─── Alerts ───────────────────────────────────────────────
function buildAlerts(){
  const products=getProducts();
  const f=state.alertsFilter;
  const exp=products.filter(p=>getDays(p.expiryDate)<0);
  const crit=products.filter(p=>{const d=getDays(p.expiryDate);return d>=0&&d<=30;});
  const warn=products.filter(p=>{const d=getDays(p.expiryDate);return d>30&&d<=90;});
  // conflicts
  const ingMap={};products.forEach(p=>{const k=(p.activeIngredient||'').trim().toLowerCase();if(!ingMap[k])ingMap[k]=[];ingMap[k].push(p);});
  const conflicts=Object.values(ingMap).filter(v=>v.length>1).map(items=>{const sorted=[...items].sort((a,b)=>getDays(a.expiryDate)-getDays(b.expiryDate));return{ing:sorted[0].activeIngredient,items:sorted,minDays:getDays(sorted[0].expiryDate)};}).sort((a,b)=>a.minDays-b.minDays);
  const total=exp.length+crit.length+warn.length;
  const tabs=[{k:'all',l:'الكل',c:total+conflicts.length},{k:'expired',l:'منتهية',c:exp.length},{k:'critical',l:'حرجة',c:crit.length},{k:'warning',l:'تحذير',c:warn.length},{k:'conflicts',l:'تعارضات',c:conflicts.length}];
  let body='';
  if(total===0&&conflicts.length===0){body=`<div class="card empty-state"><div style="width:60px;height:60px;border-radius:18px;background:#f0fdf4;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:#16a34a;">${ic('check',30)}</div><div style="color:#334155;font-weight:700;font-size:15px;">لا توجد تنبيهات 🎉</div></div>`;}
  if(f==='all'||f==='conflicts'){
    conflicts.forEach(g=>{
      const expanded=state.alertsExpanded.has(g.ing);
      const mst=getStatus(g.minDays);
      const rows=expanded?g.items.map((p,i)=>{const d=getDays(p.expiryDate);const st=getStatus(d);return`<div style="padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f8fafc;${i===0?'background:'+st.cls:''};"><span style="font-size:11px;font-weight:800;padding:2px 8px;border-radius:8px;flex-shrink:0;background:${i===0?'#ef4444':'#f1f5f9'};color:${i===0?'#fff':'#64748b'};min-width:36px;text-align:center;">${i===0?'أولاً':i+1}</span><div style="flex:1;min-width:0;"><div style="font-weight:700;color:#0f172a;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div><div style="font-size:11px;color:#94a3b8;margin-top:1px;">${fmtDate(p.expiryDate)} • ${p.quantity||0} علبة</div></div><span style="font-size:12px;font-weight:700;flex-shrink:0;color:${st.color};">${d<0?'منتهي':d+' يوم'}</span></div>`;}).join(''):'';
      body+=`<div class="card" style="border:1.5px solid ${g.minDays<0?'#fca5a5':g.minDays<=30?'#fed7aa':'#e9d5ff'};margin-bottom:10px;"><button onclick="toggleAlertGroup('${g.ing.replace(/'/g,"\\'")}')" style="width:100%;padding:14px 16px;display:flex;align-items:center;gap:10px;text-align:right;min-height:52px;background:none;border:none;cursor:pointer;font-family:inherit;"><span class="dot ${mst.dot}"></span><div style="flex:1;min-width:0;"><div style="font-weight:800;color:#0f172a;font-size:14px;">${g.ing}</div><div style="font-size:12px;color:#64748b;margin-top:2px;">${g.items.length} أصناف</div></div><span style="font-size:13px;font-weight:700;color:${mst.color};">${g.minDays<0?'يوجد منتهي':g.minDays+' يوم'}</span><span style="color:#94a3b8;font-size:12px;display:inline-block;transition:transform .2s;${expanded?'transform:rotate(180deg)':''}">▼</span></button>${expanded?`<div style="border-top:1px solid #f1f5f9;">${rows}</div>`:''}</div>`;
    });
  }
  const listSection=(items,color,title)=>{if(!items.length)return'';const rows=items.map(p=>{const d=getDays(p.expiryDate);const st=getStatus(d);return`<div style="padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f8fafc;"><span class="dot ${st.dot}"></span><div style="flex:1;min-width:0;"><div style="font-weight:700;color:#0f172a;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div><div style="font-size:11px;color:#94a3b8;margin-top:1px;">${p.activeIngredient||''}</div></div><div style="text-align:left;flex-shrink:0;"><div style="font-size:11px;color:#94a3b8;">${fmtDate(p.expiryDate)}</div><div style="font-size:12px;font-weight:800;color:${st.color};">${d<0?'منتهي':d+' يوم'}</div></div></div>`;}).join('');return`<div class="card" style="border:1.5px solid ${color};margin-bottom:10px;">${rows}</div>`;};
  if(f==='all'||f==='expired')body+=listSection(exp,'#fca5a5','منتهية');
  if(f==='all'||f==='critical')body+=listSection(crit,'#fed7aa','حرجة');
  if(f==='all'||f==='warning')body+=listSection(warn,'#fde68a','تحذير');
  return`
<div style="display:flex;flex-direction:column;gap:14px;">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div><div class="page-title">التنبيهات</div><div class="page-sub">${total+conflicts.length} تنبيه</div></div>
    <div style="width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#f59e0b,#f97316);display:flex;align-items:center;justify-content:center;color:#fff;">${ic('bell',22)}</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">${tabs.map(t=>`<button class="filter-btn${f===t.k?' active':''}" onclick="setAlertsFilter('${t.k}')">${t.l}${t.c>0?` <span style="opacity:.7;font-size:11px;">${t.c}</span>`:''}</button>`).join('')}</div>
  ${body}
  <div style="height:70px;"></div>
</div>`;
}

// ─── Barcode Scanner ──────────────────────────────────────
let _scannerTargetId=null,_scannerSearchMode=false,_stream=null,_bdetLoop=null,_scanActive=false;

function openScanner(targetInputId,isSearch){
  _scannerTargetId=targetInputId;
  _scannerSearchMode=!!isSearch;
  const modal=document.getElementById('scanner-modal');
  if(modal)modal.style.display='flex';
  startScannerCamera();
}

function closeScanner(){
  _scanActive=false;
  if(_bdetLoop){cancelAnimationFrame(_bdetLoop);_bdetLoop=null;}
  if(_stream){_stream.getTracks().forEach(t=>t.stop());_stream=null;}
  const modal=document.getElementById('scanner-modal');
  if(modal)modal.style.display='none';
  const vid=document.getElementById('scanner-video');
  if(vid){vid.srcObject=null;}
}

async function startScannerCamera(){
  const vid=document.getElementById('scanner-video');
  const status=document.getElementById('scanner-status');
  if(!vid||!status)return;
  _scanActive=true;
  status.innerHTML='<span style="color:#94a3b8;">جاري فتح الكاميرا...</span>';

  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    status.innerHTML='<span style="color:#ef4444;">⚠️ الكاميرا غير مدعومة في هذا المتصفح</span>';return;
  }

  // Try cameras in order
  const tries=[
    {video:{facingMode:{exact:'environment'}}},
    {video:{facingMode:'environment'}},
    {video:{facingMode:'user'}},
    {video:true}
  ];
  let stream=null;
  for(const c of tries){
    try{stream=await navigator.mediaDevices.getUserMedia(c);break;}
    catch(e){
      if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
        status.innerHTML='<span style="color:#ef4444;">⚠️ لم يُسمح بالكاميرا — افتح الإعدادات وأعطِ إذن الكاميرا للمتصفح</span>';
        return;
      }
    }
  }
  if(!stream){status.innerHTML='<span style="color:#ef4444;">⚠️ تعذّر فتح أي كاميرا</span>';return;}
  _stream=stream;

  // Continuous focus if supported
  const track=stream.getVideoTracks()[0];
  try{
    const caps=track.getCapabilities?.();
    const adv={};
    if(caps?.focusMode?.includes('continuous'))adv.focusMode='continuous';
    if(caps?.exposureMode?.includes('continuous'))adv.exposureMode='continuous';
    if(Object.keys(adv).length)await track.applyConstraints({advanced:[adv]});
  }catch(e){}

  // Attach stream
  vid.srcObject=stream;
  vid.muted=true;
  vid.playsInline=true;

  try{
    await new Promise((res)=>{
      if(vid.readyState>=3)return res();
      vid.onloadeddata=res;
      setTimeout(res,4000);
    });
    await vid.play();
  }catch(e){console.warn('play err',e);}

  status.innerHTML='<span style="display:inline-flex;align-items:center;gap:8px;color:#14b8a6;"><span class="ping" style="width:8px;height:8px;background:#14b8a6;border-radius:50%;display:inline-block;flex-shrink:0;"></span>وجّه الكاميرا نحو الباركود</span>';

  // ── Strategy A: Native BarcodeDetector (Chrome Android) ──
  if('BarcodeDetector' in window){
    let det;
    try{
      const supported=await BarcodeDetector.getSupportedFormats();
      det=new BarcodeDetector({formats:supported.length?supported:['ean_13','ean_8','code_128','qr_code','upc_a','upc_e']});
    }catch(e){try{det=new BarcodeDetector();}catch(e2){det=null;}}

    if(det){
      const cvs=document.createElement('canvas');
      const cx=cvs.getContext('2d');
      let busy=false;
      async function loop(){
        if(!_scanActive)return;
        if(!busy&&vid.readyState>=2&&vid.videoWidth>0){
          busy=true;
          cvs.width=vid.videoWidth;cvs.height=vid.videoHeight;
          cx.drawImage(vid,0,0);
          try{
            const r=await det.detect(cvs);
            if(r.length&&_scanActive){
              if(navigator.vibrate)navigator.vibrate([60,30,60]);
              onBarcodeScanned(r[0].rawValue);return;
            }
          }catch(e){}
          busy=false;
        }
        _bdetLoop=requestAnimationFrame(loop);
      }
      _bdetLoop=requestAnimationFrame(loop);
      return;
    }
  }

  // ── Strategy B: ZXing (loaded via CDN) ──
  if(window.ZXing){
    try{
      const hints=new Map([[window.ZXing.DecodeHintType.TRY_HARDER,true]]);
      const reader=new window.ZXing.BrowserMultiFormatReader(hints);
      _stream._zx=reader;
      reader.decodeFromStream(stream,vid,(result,err)=>{
        if(result&&_scanActive){
          if(navigator.vibrate)navigator.vibrate([60,30,60]);
          onBarcodeScanned(result.getText());
        }
      });
    }catch(e){
      status.innerHTML='<span style="color:#f59e0b;">📷 الكاميرا تعمل — أدخل الباركود يدوياً</span>';
    }
    return;
  }

  status.innerHTML='<span style="color:#f59e0b;">📷 الكاميرا تعمل — أدخل الباركود يدوياً</span>';
}

// ══════════════════════════════════════════════════════════
// BACKGROUND NOTIFICATIONS — via scheduled localStorage polling
// ══════════════════════════════════════════════════════════

// Write a SW file inline into the page as a <script id="sw-script"> 
// then register it via URL using a same-origin workaround via data URI won't work
// so we use: write SW code to a same-origin JS file dynamically isn't possible
// REAL solution: embed SW in a <script type="text/js-sw"> and register via
// navigator.serviceWorker.register using a same-origin script that reads from localStorage

// Since we are a single HTML file, we use the best available approach:
// 1. On open: schedule native Notification checks via setInterval (works while browser open)  
// 2. Store "next check time" in localStorage so we can fire on re-open if overdue
// 3. Use Page Visibility API to re-check when user returns to page/app

let _bgNotifInterval = null;
let _bgNotifTimeout = null;
const BG_CHECK_INTERVAL = 60 * 60 * 1000; // 1 hour
const BG_STORAGE_KEY = 'pn_last_notif_check';

function scheduleSWNotif(){
  if(!state.loggedIn) return;
  // Clear existing
  if(_bgNotifInterval) clearInterval(_bgNotifInterval);
  if(_bgNotifTimeout) clearTimeout(_bgNotifTimeout);

  // Check if we missed a scheduled check (e.g. app was closed and reopened)
  const lastCheck = parseInt(localStorage.getItem(BG_STORAGE_KEY + '_' + _currentUser()) || '0');
  const now = Date.now();
  const overdue = now - lastCheck > BG_CHECK_INTERVAL;

  // Fire immediately if overdue or first time
  if(overdue || !lastCheck){
    _bgNotifTimeout = setTimeout(() => _fireBgNotif(), 3000);
  }

  // Then repeat every hour
  _bgNotifInterval = setInterval(() => _fireBgNotif(), BG_CHECK_INTERVAL);
}

function cancelSWNotif(){
  if(_bgNotifInterval){ clearInterval(_bgNotifInterval); _bgNotifInterval = null; }
  if(_bgNotifTimeout){ clearTimeout(_bgNotifTimeout); _bgNotifTimeout = null; }
}

function _fireBgNotif(){
  if(!state.loggedIn) return;
  if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  const products = getProducts();
  if(!products.length) return;

  const now = new Date(); now.setHours(0,0,0,0);
  const urgent = products.filter(p => {
    const exp = new Date(p.expiryDate); exp.setHours(0,0,0,0);
    return Math.round((exp - now) / 86400000) <= 90;
  }).sort((a,b) => new Date(a.expiryDate) - new Date(b.expiryDate)).slice(0, 5);

  if(!urgent.length) return;

  // Save last check time
  localStorage.setItem(BG_STORAGE_KEY + '_' + _currentUser(), Date.now().toString());

  const lines = urgent.map(p => {
    const d = Math.round((new Date(p.expiryDate) - new Date()) / 86400000);
    return p.name + ': ' + (d < 0 ? 'منتهي' : d + ' يوم');
  });
  const expCount = urgent.filter(p => Math.round((new Date(p.expiryDate)-new Date())/86400000) < 0).length;
  const critCount = urgent.filter(p => { const d=Math.round((new Date(p.expiryDate)-new Date())/86400000); return d>=0&&d<=30; }).length;

  try {
    new Notification('⚠️ PharmaNear — ' + _currentUser(), {
      body: lines.join('\n'),
      tag: 'pn-bg-' + _currentUser(),
      renotify: true,
      requireInteraction: false,
    });
  } catch(e) { console.warn('Notif failed:', e); }
}

// Re-check when user comes back to the page/app (Page Visibility API)
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && state.loggedIn){
    const lastCheck = parseInt(localStorage.getItem(BG_STORAGE_KEY + '_' + _currentUser()) || '0');
    if(Date.now() - lastCheck > BG_CHECK_INTERVAL){
      setTimeout(_fireBgNotif, 1000);
    }
  }
});


</script>
